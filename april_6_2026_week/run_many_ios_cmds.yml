---
# Router configs
- name: Cisco Wired Campus Design
  hosts: gns3_core:gns3_access
  gather_facts: false
  connection: network_cli        # modern connection method

  vars: 
    cli:
      username: bryan
      password: bryan 

  tasks:
    - name: Global config settingsf
      ios_config:
        authorize: yes
        # parents: router ospf 1
        lines:
          - vtp mode transparent
          - spanning-tree mode rapid-pvst
          - udld enable
          - errdisable detect cause all
          - errdisable recovery cause all
          - port-channel load-balance src-dst-ip
          - ip name-server 8.8.8.8
          - no ip http server
          - no ip http secure-server

          - ntp server 87.81.181.2
          - ntp update-calendar

          - clock timezone IDT +3
          - clock summer-time IDT recurring
          - service timestamps log datetime msec localtime show-timezone
          - service timestamps debug datetime msec localtime show-timezone

          - "vlan 1,10,20,30,40,50,100,101"
          - ip default-gateway 192.168.42.1

          # - no ip dhcp snooping information option
          # - ip dhcp snooping
          # - ip dhcp snooping vlan 1-4094
          # - "ip arp inspection vlan 100,101"
          - spanning-tree portfast default
          - spanning-tree portfast bpduguard default
          

      register: print_output
    - debug:
        var: print_output.updates

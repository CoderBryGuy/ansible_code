---
#router configs

- name: enable ospf
  hosts: gns3-router
  gather_facts: false
  connection: local

  vars:
    cli:
      username: bryan
      password: bryan
      # transport: cli  <-- removed because it's unsupported

  tasks:
    - name: enable ospf
      ios_config:
        provider: "{{ cli }}"
        authorize: yes
        parents: router ospf 1
        lines:
          - network 0.0.0.0 255.255.255.255 area 0
      register: print_output

    - debug:
        var: print_output.stdout_lines

#switch configs
- name: Switch specific config
  hosts: gns3-core
  gather_facts: false
  connection: local

  vars:
    cli:
      username: bryan
      password: bryan
      # transport: cli  <-- removed because it's unsupported

  tasks:
    - name: Create VLANS
      ios_config:
        provider: "{{ cli }}"
        authorize: yes
        lines:
          - vlan 20
          - vlan 30
          - vlan 40
          - vlan 50

      register: print_output

    - debug:
        var: print_output.stdout_lines

---
- name: enable ospf
  hosts: gns3-router
  gather_facts: false
  connection: local

  vars:
    cli:
      username: bryan
      password: bryan
      # transport: cli  <-- removed because it's unsupported

  tasks:
    - name: enable ospf
      ios_config:
        provider: "{{ cli }}"
        authorize: yes
        parents: router ospf 1
        lines:
          - network 0.0.0.0 255.255.255.255 area 0
      register: print_output

    - debug:
        var: print_output.stdout_lines
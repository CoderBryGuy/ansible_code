---
- name: show version
  hosts: gns3-core:gns3-access
  gather_facts: false
  connection: local

  tasks:
    - name: run multiple commands on remote nodes
      ios_command:
        commands:
          - show version
          - show ip interface brief
      # raw: "show version"
      register: print_output

    - debug:
        var: print_output.stdout_lines

    - name: save to output file
      copy:
        content: "{{ print_output.stdout[0]}}"
        dest: ./output/{{inventory_hostname}}.txt